# ============================================================
# config.example.yaml  —  copy to configs/config.yaml and fill in your values
# ============================================================

# =========================
# Project
# =========================
project:
  name: rag_web
  env: production   # dev / production

# =========================
# Security
# =========================
security:
  allow_credential_redirect: true
  credential_redirect_mode: "redirect_only"
  credential_article_allowlist:
    - "id=666:ont-password"   # example article ID that contains credentials

# =========================
# Web Crawling
# =========================
web:
  domain: "YOUR_INTERNAL_DOMAIN_OR_IP"   # e.g. 192.168.1.100
  start_urls:
    - "http://YOUR_INTERNAL_DOMAIN_OR_IP/wiki"  # Starting URL for crawler
  crawl_depth: 3
  rate_limit_sec: 0.3
  max_pages: 300
  allowed_paths:
    - "/wiki"            # Only crawl this path prefix
  deny_extensions:
    - ".pdf"
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".zip"
    - ".rar"
    - ".7z"
    - ".tar"
    - ".gz"
    - ".exe"
    - ".dmg"
    - ".iso"
    - ".bin"
    - ".mp4"
    - ".mp3"
    - ".avi"
    - ".mov"
    - ".pptx"
    - ".docx"
    - ".xlsx"

# =========================
# Text Chunking
# =========================
chunk:
  chunk_size: 700
  overlap: 100

# =========================
# Retrieval
# =========================
retrieval:
  top_k: 3
  score_threshold: 0.2

# =========================
# RAG Logic
# =========================
rag:
  latency_logging: true
  score_threshold: 0.15

# =========================
# Vector Database
# =========================
vectorstore:
  type: chroma
  persist_dir: data/vectorstore
  collection_name: rag_collection
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2

# =========================
# LLM (Ollama)
# =========================
llm:
  provider: ollama
  model: "llama3.2:3b"        # Model to use (must be pulled via Ollama)
  fast_model: "llama3.2:3b"
  base_url: "http://localhost:11434"   # Default Ollama server
  temperature: 0.2
  max_context_chars: 2500
  timeout_sec: 300

# =========================
# Chat / UI Behavior
# =========================
chat:
  show_context: false
  save_log: true
  language: th               # Response language: th (Thai) or en (English)
  mode: production           # debug / production

# =========================
# UX / Formatting
# =========================
ux:
  enable_formatting: true
  direct_content_preview: true
  max_nav_links: 5

# =========================
# Runtime / Logging
# =========================
runtime:
  runs_dir: results/runs
  log_level: INFO

# =========================
# Escalation
# =========================
escalation:
  contact_phone: "02-XXX-XXXX"
  contact_email: "support@example.com"
  auto_trigger_after_failures: 3

# =========================
# Ingestion
# =========================
ingest:
  save_raw_html: true
  save_clean_text: true
