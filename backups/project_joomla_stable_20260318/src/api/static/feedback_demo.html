<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Demo - RAG System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            margin-bottom: 20px;
        }

        h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .query-section {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .query-section h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .query-text {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .answer-text {
            color: #333;
            font-size: 15px;
            line-height: 1.6;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .feedback-section {
            margin-top: 30px;
        }

        .feedback-section h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .rating-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .rating-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .rating-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .rating-btn.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .rating-btn.like.selected {
            border-color: #28a745;
            background: #d4edda;
        }

        .rating-btn.dislike.selected {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .rating-btn .icon {
            font-size: 24px;
        }

        .comment-section {
            margin-bottom: 20px;
        }

        .comment-section label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .comment-box {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s;
        }

        .comment-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .stats-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Feedback Form -->
        <div class="card">
            <h1>💬 ให้ Feedback</h1>
            <p class="subtitle">ช่วยเราปรับปรุงคำตอบให้ดียิ่งขึ้น</p>

            <div class="query-section">
                <h3>คำถาม</h3>
                <div class="query-text" id="queryText">ศูนย์หาดใหญ่โทรอะไร</div>

                <h3>คำตอบ</h3>
                <div class="answer-text" id="answerText">
                    📞 เบอร์ติดต่อศูนย์หาดใหญ่:<br>
                    • โทร: 074-xxx-xxxx<br>
                    • ผู้รับผิดชอบ: คุณสมชาย
                </div>
            </div>

            <div class="feedback-section">
                <h3>คำตอบนี้ตอบโจทย์หรือไม่?</h3>

                <div class="rating-buttons">
                    <button class="rating-btn like" id="likeBtn">
                        <span class="icon">👍</span>
                        <span>ดี</span>
                    </button>
                    <button class="rating-btn dislike" id="dislikeBtn">
                        <span class="icon">👎</span>
                        <span>ไม่ดี</span>
                    </button>
                </div>

                <div class="comment-section">
                    <label for="commentBox">ความคิดเห็นเพิ่มเติม (ถ้ามี)</label>
                    <textarea id="commentBox" class="comment-box"
                        placeholder="แชร์ความคิดเห็นของคุณ...&#10;เช่น: ตอบถูกต้อง รวดเร็ว หรือ ตอบไม่ตรงคำถาม"></textarea>
                </div>

                <button class="submit-btn" id="submitBtn" disabled>
                    ส่ง Feedback
                </button>

                <div class="message" id="message"></div>
            </div>
        </div>

        <!-- Stats Display -->
        <div class="stats-card">
            <h1 style="margin-bottom: 20px;">📊 สถิติ Feedback</h1>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalFeedback">-</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="likeRate">-%</div>
                    <div class="stat-label">Like Rate</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="likesCount">-</div>
                    <div class="stat-label">Likes 👍</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="dislikesCount">-</div>
                    <div class="stat-label">Dislikes 👎</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/feedback.js"></script>
</body>

</html>
