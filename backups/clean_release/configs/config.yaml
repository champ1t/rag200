# =========================
# Project
# =========================
project:
  name: rag_web
  env: production   # dev / production (ใช้เป็น label ได้)

# =========================
# Security
# =========================
security:
  allow_credential_redirect: true
  credential_redirect_mode: "redirect_only"
  credential_article_allowlist:
    - "id=666:ont-password"
    - "ont-password"

# =========================
# Web Crawling
# =========================
web:
  domain: "INTERNAL_SMC_IP"
  start_urls:
    - "http://INTERNAL_SMC_IP/smc"
  crawl_depth: 3          # Increased depth for better coverage
  rate_limit_sec: 0.3     # กันยิงเว็บถี่เกิน
  max_pages: 300          # กัน crawler หลุดไกล (ถ้าโค้ดรองรับ)
  allowed_paths:
    - "/smc"              # เก็บเฉพาะ path นี้
  deny_extensions:
    - ".pdf"
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".zip"
    - ".rar"
    - ".7z"
    - ".tar"
    - ".gz"
    - ".exe"
    - ".dmg"
    - ".iso"
    - ".bin"
    - ".mp4"
    - ".mp3"
    - ".avi"
    - ".mov"
    - ".wmv"
    - ".flv"
    - ".mkv"
    - ".pptx"
    - ".docx"
    - ".xlsx"

# =========================
# Text Chunking
# =========================
chunk:
  chunk_size: 700         # เว็บจริงมักเนื้อหายาว
  overlap: 100

# =========================
# Retrieval
# =========================
retrieval:
  top_k: 3                # แนะนำ 2–3
  score_threshold: 0.2    # ตัด context ที่ไม่เกี่ยวมาก

# =========================
# RAG Logic
# =========================
rag:
  latency_logging: true
  score_threshold: 0.15    # Lowered to ensure synthetic pages and Q1 are included


# =========================
# Vector Database
# =========================
vectorstore:
  type: chroma
  persist_dir: data/vectorstore
  collection_name: smc_web
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2

# =========================
# LLM (Ollama)
# =========================
llm:
  provider: ollama
  model: "llama3.2:3b"        # Reverted to Llama 3.2 (Phase 173) for speed
  fast_model: "llama3.2:3b" # Unified fast model
  base_url: "http://localhost:11434"
  temperature: 0.2
  max_context_chars: 2500     # ลด latency
  timeout_sec: 300            # Increased for slow manual extraction

# =========================
# Chat / UI Behavior
# =========================
chat:
  show_context: false         # Debug: false (User requested to hide)
  save_log: true              # เก็บ audit log
  language: th                # ไว้ใช้ต่อยอด prompt
  mode: production            # debug / production

# =========================
# UX / Formatting
# =========================
ux:
  enable_formatting: true      # Toggle formatting layer (Phase 172)
  direct_content_preview: true # Phase 173: Use direct text preview instead of LLM summary
  max_nav_links: 5             # Max links to show on Nav Pages

# =========================
# Runtime / Logging
# =========================
runtime:
  runs_dir: results/runs
  log_level: INFO

# =========================
# Escalation
# =========================
escalation:
  contact_phone: "02-XXX-XXXX"  # Change to actual support number
  contact_email: "support@example.com"  # Change to actual support email
  auto_trigger_after_failures: 3  # Auto-escalate after N failed queries

ingest:
  save_raw_html: true
  save_clean_text: true

