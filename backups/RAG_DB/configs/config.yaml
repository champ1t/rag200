# =========================
# Project
# =========================
project:
  name: rag_web
  env: production   # dev / production (ใช้เป็น label ได้)

# =========================
# Web Crawling
# =========================
web:
  domain: "10.192.133.33"
  start_urls:
    - "http://10.192.133.33/smc"
  crawl_depth: 3          # Increased depth for better coverage
  rate_limit_sec: 0.3     # กันยิงเว็บถี่เกิน
  max_pages: 300          # กัน crawler หลุดไกล (ถ้าโค้ดรองรับ)
  allowed_paths:
    - "/smc"              # เก็บเฉพาะ path นี้
  deny_extensions:
    - ".pdf"
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".zip"
    - ".rar"
    - ".7z"
    - ".tar"
    - ".gz"
    - ".exe"
    - ".dmg"
    - ".iso"
    - ".bin"
    - ".mp4"
    - ".mp3"
    - ".avi"
    - ".mov"
    - ".wmv"
    - ".flv"
    - ".mkv"
    - ".pptx"
    - ".docx"
    - ".xlsx"

# =========================
# Text Chunking
# =========================
chunk:
  chunk_size: 700         # เว็บจริงมักเนื้อหายาว
  overlap: 100

# =========================
# Retrieval
# =========================
retrieval:
  top_k: 3                # แนะนำ 2–3
  score_threshold: 0.2    # ตัด context ที่ไม่เกี่ยวมาก

# =========================
# RAG Logic
# =========================
rag:
  latency_logging: true
  score_threshold: 0.25    # Lowered to ensure synthetic pages are included


# =========================
# Vector Database
# =========================
vectorstore:
  type: chroma
  persist_dir: data/vectorstore
  collection_name: smc_web
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2

# =========================
# LLM (Ollama)
# =========================
llm:
  provider: ollama
  model: "qwen3:8b"        # Switched to Qwen for better Thai support
  base_url: "http://localhost:11434"
  temperature: 0.2
  max_context_chars: 2500     # ลด latency
  timeout_sec: 120            # เผื่อโมเดลใหญ่

# =========================
# Chat / UI Behavior
# =========================
chat:
  show_context: false         # Debug: false (User requested to hide)
  save_log: true              # เก็บ audit log
  language: th                # ไว้ใช้ต่อยอด prompt
  mode: production            # debug / production

# =========================
# Incremental State
# =========================
state:
  path: data/state.json       # ใช้ track content_hash

# =========================
# Runtime / Logging
# =========================
runtime:
  runs_dir: results/runs
  log_level: INFO

ingest:
  save_raw_html: true
  save_clean_text: true
