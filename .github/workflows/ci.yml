name: RAG System CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_linux.txt

      - name: Run unit tests (no LLM required)
        run: |
          python -m pytest tests/unit/ -v --tb=short -x \
            --ignore=tests/unit/test_ingest_ocr.py

      - name: Run integration tests (mocked)
        run: |
          python -m pytest tests/integration/test_hardened_mode.py -v --tb=short

      - name: Check import health
        run: |
          python -c "from src.vectorstore.chroma import ChromaVectorStore; print('VectorStore OK')"
          python -c "from src.ingest.fetch import fetch_url; print('Fetch OK')"
          python -c "from src.ingest.process_one import compute_hash; print('Process OK')"

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check src/ scripts/ --ignore E501,E402,F401
        continue-on-error: true   # warn only, don't fail build
