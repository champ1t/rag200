    intent: POSITION_HOLDER_LOOKUP
    route: position_holder_hit

- q: "ใครดำรงตำแหน่ง ผส.บลตน"
  expect:
    intent: POSITION_HOLDER_LOOKUP
    route: position_holder_hit

- q: "เบอร์ ผส.บลตน"
  expect:
    intent: CONTACT_LOOKUP
    route: contact_hit_role # Correct route key in implementation

- q: "เบอร์ผส"
  expect:
    intent: CONTACT_LOOKUP
    # route: contact_ambiguous # Requires disambiguation logic
    
- q: "ข่าว SMC"
  expect:
    intent: NEWS_SEARCH
    route: article_answer # Implementation uses Article Interpreter directly

- q: "แก้ user context private"
  expect:
    intent: HOWTO_PROCEDURE
    # route: article_hit # or correct rag route
