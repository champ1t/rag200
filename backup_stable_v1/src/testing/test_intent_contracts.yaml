# Golden Test Cases for Intent & Route Contracts
# Format: List of test cases
# q: User Query
# expect:
#   intent: Router Intent (Required)
#   route: Chat Engine Route (Optional - strictly matched if present)
#   result: hit/miss (Optional - checking high level outcome)
#   response_type: clarify/full/error (Optional)

- q: "บุคลากรงาน Management SMC"
  expect:
    intent: TEAM_LOOKUP
    route: team_miss # Strict miss (Threshold > 0.6 filtered weak suggestions)
    # result: miss

- q: "สมาชิกงาน FTTx"
  expect:
    intent: TEAM_LOOKUP
    route: team_hit 
    # result: hit

- q: "สมาชิกงาน SMC"
  expect:
    intent: TEAM_LOOKUP
    route: team_miss # No teams match 'SMC' anymore
    # result: miss

- q: "บุคลากร Management"
  expect:
    intent: TEAM_LOOKUP
    route: team_ambiguous
    # result: ambiguous

- q: "FTTx and NIS Manual"
  expect:
    intent: HOWTO_PROCEDURE # Should be rerouted or detected directly
    # route: team_demoted -> Handled -> Article/HowTo (flexible on actual route name depending on result)
    # The contract checks intent. ChatEngine might return result with intent=HOWTO_PROCEDURE logic?
    # No, contract tester checks `intent` from Router OR `route` from Engine.
    # If routed to HOWTO, engine result `route` will be `manual_miss` or `rag_hit` or `article_hit`.
    # Let's ignore route for now or set it to NOT team_miss/team_ambiguous.
    # Actually, ChatEngine logic overrides `intent` variable, then falls through to HOWTO block.
    # The HOWTO block returns result.
    route: regex:.*(miss|hit|article|rag).* 
    # result: miss

- q: "คู่มือ FTTx"
  expect:
    intent: HOWTO_PROCEDURE
    route: regex:.*(miss|hit|article|rag).* 

- q: "สมาชิกงาน NonExistent"
  expect:
    intent: TEAM_LOOKUP
    route: team_miss

- q: "ใครตำแหน่ง ผส.บลตน"
